{% extends 'file/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0 p-4">

        <h3 class="mb-4">
            Change Password
        </h3>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label>Current Password</label>
                <input type="password"
                       name="current_password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>New Password</label>
                <input type="password"
                       name="new_password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password"
                       name="confirm_password"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Change Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
