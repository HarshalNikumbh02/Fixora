{% extends 'file/base.html' %}

{% block title %}Verify OTP{% endblock %}

{% block content %}

<div class="container-fluid">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm border-0 p-4">

        <h3 class="mb-4">
            Verify OTP
        </h3>

        <p class="text-danger fw-bold">
            OTP expires in
            <span id="timer">60</span>
            seconds
        </p>

        <form method="POST" id="otpForm">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    OTP
                </label>

                <input type="text"
                       name="otp"
                       class="form-control"
                       maxlength="6"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    New Password
                </label>

                <input type="password"
                       name="new_password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Confirm Password
                </label>

                <input type="password"
                       name="confirm_password"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Reset Password
            </button>

        </form>

        <a href="{% url 'send_password_otp' %}"
           id="resendBtn"
           class="btn btn-warning mt-3 d-none">

            Resend OTP

        </a>

    </div>

</div>

<script>

let timeLeft = 60;

const timer = setInterval(function() {

    document.getElementById("timer").innerText = timeLeft;

    timeLeft--;

    if (timeLeft < 0) {

        clearInterval(timer);

        document.getElementById("timer").innerText = "Expired";

        document
            .querySelectorAll("#otpForm input, #otpForm button")
            .forEach(el => el.disabled = true);

        document
            .getElementById("resendBtn")
            .classList.remove("d-none");
    }

}, 1000);

</script>

{% endblock %}
