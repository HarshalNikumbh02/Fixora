{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - Fixora</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>
<body>
    <div class="main-container">
        <div class="left-side">
            <img src="{% static 'images/logo.png' %}" class="logo">
            <h2>Society Management Console</h2>
            <p>Secure Account Recovery</p>
        </div>

        <div class="right-side">
            <div class="register-box shadow-sm text-center">
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                      <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                
                <h1 class="login-title" style="font-size: 32px;">Password Updated!</h1>
                <p class="sub-title mb-4">Your password has been successfully reset. You can now log in with your new credentials.</p>

                <a href="{% url 'login' %}" class="btn-login w-100 m-0" style="display: flex; align-items: center; justify-content: center; height: 50px; border-radius: 10px; text-decoration: none;">Go to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
