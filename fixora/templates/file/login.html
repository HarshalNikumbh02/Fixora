{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixora Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

    <div class="main-container">

        <div class="left-side">
            <img src="{% static 'images/logo.png' %}" class="logo">
            <h2>Smart Society Management</h2>
            <p>AI Powered Maintenance & Service Platform</p>
        </div>

        <div class="right-side">
            <div class="login-box">

                <h1 class="login-title">Welcome Back</h1>
                <p class="sub-title">Login to continue to FIXORA</p>

                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-danger py-2" role="alert">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <input type="text" name="username" class="form-control" placeholder="Enter Username" required>

                    <div class="input-group form-control p-0 border-0 mb-4" style="height: 50px;">
                        <input type="password" id="password" name="password" class="form-control h-100 m-0"
                            style="border-radius: 10px 0 0 10px;" placeholder="Enter Password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            style="border-radius: 0 10px 10px 0; border-color: #dee2e6; background: #fff;">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn-login" style="font-weight: 600;">Secure Login</button>
                </form>

            </div>
        </div>

    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            // Toggle the type attribute
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            }
        });
    </script>

</body>
</html>
