{% extends 'file/base.html' %}

{% block content %}
<div class="container-fluid mt-3">
    <div class="card shadow-sm border-0" style="border-radius: 15px;">
        <div class="card-body p-4">
            
            {% if alerts %}
                <div class="list-group list-group-flush">
                    {% for alert in alerts %}
                        <div class="list-group-item px-0 py-3 d-flex align-items-start border-bottom">
                            
                            <!-- Icon -->
                            <div class="me-3 mt-1">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                                    <i class="bi bi-bell-fill"></i>
                                </div>
                            </div>
                            
                            <!-- Alert Content -->
                            <div class="flex-grow-1">
                                <p class="mb-1 text-dark" style="font-size: 15px;">{{ alert.message }}</p>
                                <small class="text-muted">{{ alert.created_at|timesince }} ago</small>
                            </div>

                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="text-center py-5">
                    <i class="bi bi-bell-slash text-muted" style="font-size: 40px;"></i>
                    <h5 class="mt-3 text-muted">You're all caught up!</h5>
                    <p class="text-secondary small">You have no new notifications right now.</p>
                </div>
            {% endif %}

        </div>
    </div>
</div>
{% endblock %}
