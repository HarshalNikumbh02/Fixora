{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Fixora</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Loading your custom CSS -->
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>
<body>
    <div class="main-container">
        <div class="left-side">
            <img src="{% static 'images/logo.png' %}" class="logo">
            <h2>Society Management Console</h2>
            <p>Secure Account Recovery</p>
        </div>

        <div class="right-side">
            <div class="register-box shadow-sm">
                <h1 class="login-title" style="font-size: 32px;">Create New Password</h1>
                <p class="sub-title mb-4">We sent a 6-digit OTP to your phone.</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} py-2">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Enter 6-Digit OTP</label>
                        <input type="text" name="otp" class="form-control" placeholder="123456" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">New Password</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required>
                    </div>

                    <!-- Fixed Button Class Here -->
                    <button type="submit" class="btn-login w-100 m-0" style="height: 50px; border-radius: 10px;">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
