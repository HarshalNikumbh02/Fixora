{% extends 'file/base.html' %}
{% block content %}
<div class="container-fluid">
    <h3 class="fw-bold mb-4">Platform Analytics</h3>
    
    <div class="row">
        <div class="col-lg-6 mb-4">
            <div class="card p-4 border-0 shadow-sm rounded-4">
                <h6 class="fw-bold mb-3">Service Category Breakdown</h6>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="col-lg-6 mb-4">
            <div class="card p-4 border-0 shadow-sm rounded-4">
                <h6 class="fw-bold mb-3">Activity (Last 7 Days)</h6>
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    fetch("{% url 'get_analytics_data' %}")
        .then(response => response.json())
        .then(data => {
            // Render Category Chart
            new Chart(document.getElementById('categoryChart'), {
                type: 'pie',
                data: {
                    labels: data.categories.map(c => c.category),
                    datasets: [{ data: data.categories.map(c => c.count), backgroundColor: ['#2563eb', '#10b981', '#f59e0b'] }]
                }
            });
        });
</script>
{% endblock %}
